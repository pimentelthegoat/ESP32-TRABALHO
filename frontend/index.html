<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Velocimetro Hall ESP32</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="dashboard">
    <section class="hero">
      <div>
        <p class="eyebrow">ESP32 + KY-003</p>
        <h1>Monitoramento Hall em tempo real</h1>
      </div>

      <div id="connectionStatus" class="status offline">
        <span></span>
        offline
      </div>
    </section>

    <section class="toolbar">
      <label for="backendUrl">Backend local</label>
      <input id="backendUrl" type="url" value="http://localhost:3000" spellcheck="false">
      <button id="saveBackendUrl" type="button">Conectar</button>
    </section>

    <section class="panel">
      <div class="gauge" aria-label="Velocimetro em tempo real">
        <div class="gauge-ring">
          <div id="needle" class="needle"></div>
          <div class="hub"></div>
          <div class="gauge-readout">
            <strong id="speedValue">0.0</strong>
            <span>km/h</span>
          </div>
        </div>
      </div>

      <div class="metrics">
        <article>
          <span>RPM</span>
          <strong id="rpmValue">0</strong>
        </article>
        <article>
          <span>Pulsos/s</span>
          <strong id="pulseValue">0</strong>
        </article>
        <article>
          <span>Dispositivo</span>
          <strong id="deviceValue">--</strong>
        </article>
        <article>
          <span>Ultima leitura</span>
          <strong id="timeValue">--:--:--</strong>
        </article>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
