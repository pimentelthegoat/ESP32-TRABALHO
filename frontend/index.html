<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Velocimetro Hall ESP32</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="city-glow"></div>

  <main class="dashboard">
    <section class="hero">
      <div>
        <p class="eyebrow">ESP32 // sensor hall KY-003</p>
        <h1>Conta-giros em tempo real</h1>
      </div>

      <div id="connectionStatus" class="status offline">
        <span></span>
        offline
      </div>
    </section>

    <section class="toolbar">
      <label for="backendUrl">Backend local</label>
      <input id="backendUrl" type="url" value="http://localhost:3000" spellcheck="false">
      <button id="saveBackendUrl" type="button">Conectar</button>
    </section>

    <section class="panel">
      <div class="gauge" aria-label="Conta-giros em tempo real">
        <div class="tachometer">
          <div class="scale" id="rpmScale"></div>
          <div class="danger-zone"></div>
          <div class="inner-glass"></div>
          <div id="needle" class="needle"></div>
          <div class="hub"></div>
          <div class="center-readout">
            <span>RPM x1000</span>
            <strong id="rpmValue">0.0</strong>
            <small id="gearLabel">HALL</small>
          </div>
        </div>
      </div>

      <div class="metrics">
        <article class="speed-card">
          <span>Velocidade</span>
          <strong><span id="speedValue">0.0</span> km/h</strong>
        </article>
        <article>
          <span>Pulsos na leitura</span>
          <strong id="pulseValue">0</strong>
        </article>
        <article>
          <span>Dispositivo</span>
          <strong id="deviceValue">--</strong>
        </article>
        <article>
          <span>Ultima leitura</span>
          <strong id="timeValue">--:--:--</strong>
        </article>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
